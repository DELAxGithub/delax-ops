case28_下書きフォルダの退職届:
  引用:
    - text: 人間は、自由の刑に処されている。
      tts_text: 人間は、自由の刑（けい）に処（しょ）されている。
      source: サルトル『実存主義（じつぞんしゅぎ）はヒューマニズムである』
      voice: 老年男性B

    - text: 死は、存在（ダザイン）の「絶対的な不可能性」の可能性である。
      tts_text: 死は、現存在（げんそんざい）、ダザインの、絶対的な不可能性の可能性である。
      source: ハイデガー『存在と時間（そんざいとじかん）』§50
      voice: 老年男性C

    - text: 潛龍勿用
      tts_text: 潜龍（せんりゅう）、用（もち）うるなかれ。
      source: 『易経（えききょう）』乾卦（けんか）・初九（しょきゅう）
      voice: 老年男性D
      note: 書き下し読みでTTS

    - text: 飛龍在天
      tts_text: 飛龍（ひりゅう）、天（てん）に在（あ）り。
      source: 『易経』乾卦・九五（きゅうご）
      voice: 老年男性A
      note: 書き下し読みでTTS

  セリフ:
    - text: 今の会社も、悪い人たちじゃないし
      tts_text: 今の会社も、悪い人たちじゃないし
      role: 主人公（内心）
      voice: 若手女性
      note: "01:33"

    - text: あと3年いれば、課長になれるかもしれないし
      tts_text: あと3年いれば、課長になれるかもしれないし
      role: 主人公（内心）
      voice: 若手女性
      note: "01:36"

    - text: 外に出て、通用する保証なんてないし
      tts_text: 外に出て、通用する保証なんてないし
      role: 主人公（内心）
      voice: 若手女性
      note: "01:40"

    - text: 住宅ローンがあるから辞められない
      tts_text: 住宅ローンがあるから辞められない
      role: 主人公（自己欺瞞）
      voice: 若手女性
      note: "02:50"

    - text: 家族がいるから冒険できない
      tts_text: 家族がいるから冒険できない
      role: 主人公（自己欺瞞）
      voice: 若手女性
      note: "02:50"

    - text: 辞めるべきか、残るべきか
      tts_text: 辞めるべきか、残るべきか
      role: 主人公（問い）
      voice: 若手女性
      note: "07:12"

    - text: 私は今、潜っているのか、それとも逃げているのか
      tts_text: 私は今、潜っているのか、それとも逃げているのか
      role: 主人公（新しい問い）
      voice: 若手女性
      note: "07:16"

