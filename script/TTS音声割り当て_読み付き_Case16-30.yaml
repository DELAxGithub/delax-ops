case26_異動という名の流刑:
  引用:
    - text: 人生は振り子のように、苦痛と退屈の間を揺れ動く。
      tts_text: 人生は振り子のように、苦痛（くつう）と退屈（たいくつ）の間（あいだ）を揺れ動く。
      source: ショーペンハウアー『意志と表象としての世界（いしとひょうしょうとしてのせかい）』
      voice: 老年男性C

    - text: 生の"なぜ"を持つ者は、ほとんどどんな"いかに"にも耐える。
      tts_text: 生（せい）の「なぜ」を持つ者は、ほとんどどんな「いかに」にも耐える。
      source: ニーチェ『偶像の黄昏（ぐうぞうのたそがれ）』「箴言（しんげん）と矢」第12
      voice: 老年男性D

    - text: 随処作主、立処皆真。
      tts_text: 随処（ずいしょ）に主（しゅ）と作（な）れば、立処（りっしょ）皆（みな）真（しん）なり。
      source: 臨済義玄（りんざいぎげん）『臨済録（りんざいろく）』
      voice: 老年男性A
      note: 漢文読み下し

    - text: どこにいようと主人となれ。そうすれば、立つ場所すべてが真実の場所となる。
      tts_text: どこにいようと主人となれ。そうすれば、立つ場所すべてが真実の場所となる。
      source: 臨済義玄『臨済録』（現代語訳）
      voice: 老年男性B

  セリフ:
    - text: 来月から、地方の支店に異動してもらう
      tts_text: 来月から、地方の支店に異動してもらう
      role: 上司
      voice: 中年男性
      note: "00:04"

    - text: 来期から、九州の支店に行ってもらいたい
      tts_text: 来期から、九州の支店に行ってもらいたい
      role: 上司
      voice: 中年男性
      note: "01:10"

    - text: 君の力が必要なんだ
      tts_text: 君の力が必要なんだ
      role: 上司
      voice: 中年男性
      note: "01:23"

    - text: なぜ、自分なのか
      tts_text: なぜ、自分なのか
      role: 主人公（内心）
      voice: 若手男性
      note: "01:41"

