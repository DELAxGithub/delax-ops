case27_ノイズだらけの会議室:
  引用:
    - text: コミュニケーションしないことは、できない。
      tts_text: コミュニケーションしないことは、できない。
      source: ワツラウィック他『人間コミュニケーションの語用論（ごようろん）』公理1
      voice: 老年男性C

    - text: 独立し、融合しない複数の声と意識――それがポリフォニーである。
      tts_text: 独立し、融合（ゆうごう）しない複数の声と意識、それがポリフォニーである。
      source: バフチン『ドストエフスキーの詩学（しがく）の問題』
      voice: 老年男性D

    - text: この芸とは、衆人愛敬をもて、一座建立の寿福とせり。
      tts_text: この芸（げい）とは、衆人愛敬（しゅにんあいぎょう）をもて、一座建立（いちざこんりゅう）の寿福（じゅふく）とせり。
      source: 世阿弥（ぜあみ）『風姿花伝（ふうしかでん）』
      voice: 老年男性A

  セリフ:
    - text: この会議、本当に必要だったのかな
      tts_text: この会議、本当に必要だったのかな
      role: 主人公（内心）
      voice: 若手女性
      note: "00:04"

    - text: 次回に持ち越しましょう
      tts_text: 次回に持ち越しましょう
      role: 会議参加者
      voice: 中年男性
      note: "01:33"

    - text: そういえば、先週クライアントにこんなことを言われて
      tts_text: そういえば、先週クライアントにこんなことを言われて
      role: 同僚（脱線）
      voice: 若手男性
      note: "06:33"

