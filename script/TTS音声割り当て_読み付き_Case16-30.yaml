case29_同時進行という逃避:
  引用:
    - text: 人間の不幸はすべて、部屋で静かにじっとしていられないことから生じる。
      tts_text: 人間の不幸はすべて、部屋で静かにじっとしていられないことから生じる。
      source: パスカル『パンセ』（Lafuma 136）
      voice: 老年男性D

    - text: 若行若坐、唯念一仏
      tts_text: 若（も）し行（ぎょう）じ若し坐（ざ）するに、唯（ただ）一仏（いちぶつ）を念（ねん）ず。
      source: 『文殊師利所説摩訶般若波羅蜜経（もんじゅしりしょせつまかはんにゃはらみつきょう）』
      voice: 老年男性A
      note: 書き下し読みでTTS

    - text: 一日不作、一日不食
      tts_text: 一日（いちにち）作（な）さざれば、一日食（くら）わず。
      source: 百丈懐海（ひゃくじょうえかい）（百丈清規（ひゃくじょうしんぎ）に伝わる句）
      voice: 老年男性C
      note: 書き下し読みでTTS

    - text: われわれは自分だけの、まったく自由な店裏の空間を一つ取っておかねばならない。そこにこそ、真の自由と第一の隠れ家を築くのだ。
      tts_text: われわれは自分だけの、まったく自由な、奥の間（おくのま）の空間を一つ取っておかねばならない。そこにこそ、真の自由と第一の隠れ家を築くのだ。
      source: モンテーニュ『エセー』第1巻「孤独について」（arrière-boutique の段）
      voice: 老年男性D
      note: 店裏→TTS用に奥の間で代替

  セリフ:
    - text: 今日、何をしたんだろう
      tts_text: 今日、何をしたんだろう
      role: 主人公（内心）
      voice: 若手女性
      note: "01:26"

