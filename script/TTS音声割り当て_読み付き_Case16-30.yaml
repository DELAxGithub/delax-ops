case30_引き継ぎという贈り物:
  引用:
    - text: 暗黙知は個人的で、文脈依存であり、それゆえ形式化や伝達が難しい。
      tts_text: 暗黙知（あんもくち）は個人的で、文脈依存（ぶんみゃくいそん）であり、それゆえ形式化（けいしきか）や伝達が難しい。
      source: 野中郁次郎（のなかいくじろう）・竹内弘高（たけうちひろたか）『知識創造企業（ちしきそうぞうきぎょう）』
      voice: 老年男性A

    - text: 私は立場を転じ、「やり方を知っている」は「事実を知っている」に還元できないことを示したい。
      tts_text: 私は立場を転じ、「やり方を知っている」ことは「事実を知っている」ことに還元（かんげん）できないことを示したい。
      source: ライル『心の概念（こころのがいねん）』第2章
      voice: 老年男性B

    - text: 不立文字、教外別伝
      tts_text: 不立文字（ふりゅうもんじ）、教外別伝（きょうげべつでん）。
      source: 禅の標語（宋代以降に定型化した伝承句）
      voice: 老年男性C

    - text: 文字に立てず、教えの外に別に伝える
      tts_text: 文字（もんじ）に立てず、教えの外（ほか）に別（べつ）に伝える。
      source: 禅の標語（上記の書き下し）
      voice: 老年男性D

    - text: 私には正しい教えの眼がある。それを摩訶迦葉に託そう
      tts_text: 私には正しい教えの眼（まなこ）がある。それを摩訶迦葉（まかかしょう）に託そう。
      role: 釈迦（しゃか）
      voice: 老年男性A

  セリフ:
    - text: あの人なら、どうするか？
      tts_text: あの人なら、どうするか？
      role: 主人公（内心）
      voice: 若手女性
      note: "06:02"
